name: Flutter Tag Build

on:
  workflow_dispatch:
    inputs:
      inventory-report-url:
        description: "URL отчётов (POST …/api/v1/report). Пусто — не зашивать"
        required: false
        default: ""
        type: string
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-[0-9]+'

jobs:
  run-flutter-tag-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: ${{ github.ref_name }}
      inventory-report-url: ${{ github.event.inputs.inventory-report-url || '' }}