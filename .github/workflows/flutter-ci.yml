name: Full Flutter CI

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
    - "docs/**"
    - "README.md"
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"
      - "res/**"
      - "appimage/**"
      - "flatpak/**"

jobs:
  run-ci:
    if: ${{ github.event_name != 'push' || !(github.event.head_commit && contains(github.event.head_commit.message, '[skip ci]')) }}
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: false

  run-ci-cashdesk:
    if: ${{ github.event_name != 'push' || !(github.event.head_commit && contains(github.event.head_commit.message, '[skip ci]')) }}
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: false
      conn-type: "incoming"
      desktop-ui-flavor: "cashdesk"
