services:
  backend:
    build: ./backend
    container_name: inv-portal-api
    environment:
      DATABASE_URL: sqlite:/data/inventory.db?mode=rwc
      # По умолчанию совпадает с RS_PUB_KEY / DEFAULT_INVENTORY_REPORT_TOKEN в libs/hbb_common/src/config.rs
      INVENTORY_DEVICE_TOKEN: ${INVENTORY_DEVICE_TOKEN:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:
      JWT_SECRET: ${JWT_SECRET:
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: inventory_portal_api=info,tower_http=info
    volumes:
      - inv_data:/data
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: inv-portal-web
    ports:
      - "${PORT:-1026}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  inv_data:
